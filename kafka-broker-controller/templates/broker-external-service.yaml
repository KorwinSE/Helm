{{- if .Values.external.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: broker-external
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: kafka-broker
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
      nodePort: {{ .Values.external.nodePort }}
{{- end }}
