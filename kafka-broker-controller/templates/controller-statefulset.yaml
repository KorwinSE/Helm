apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-controller
  namespace: {{ .Values.namespace }}
spec:
  serviceName: controller
  replicas: {{ .Values.controllers.replicas }}
  selector:
    matchLabels:
      app: kafka-controller
  template:
    metadata:
      labels:
        app: kafka-controller
    spec:
      initContainers:
        - name: format-storage
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CLUSTER_ID
              value: {{ .Values.clusterId | quote }}
          command:
            - sh
            - -c
            - |
              NODE_ID=${POD_NAME//[^0-9]/}
              cp /etc/kafka-config/controller.properties /tmp/server.properties
              sed -i "s/node.id=/node.id=$NODE_ID/" /tmp/server.properties

              if [ ! -f /var/lib/kafka/metadata/meta.properties ]; then
                /opt/kafka/bin/kafka-storage.sh format \
                  --cluster-id $CLUSTER_ID \
                  --config /tmp/server.properties \
                  --ignore-formatted
              fi
          volumeMounts:
            - name: metadata
              mountPath: /var/lib/kafka/metadata
            - name: kafka-config
              mountPath: /etc/kafka-config
            - name: kafka-temp
              mountPath: /tmp

      containers:
        - name: kafka
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - sh
            - -c
            - exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          volumeMounts:
            - name: metadata
              mountPath: /var/lib/kafka/metadata
            - name: kafka-temp
              mountPath: /tmp

      volumes:
        - name: kafka-config
          configMap:
            name: kafka-controller-config
        - name: kafka-temp
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: metadata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.controllers.metadataSize }}
